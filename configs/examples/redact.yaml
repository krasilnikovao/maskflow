# Пример: полное замещение (redact mode).
#
# Поведение:
#   - Значение полностью заменяется фиксированным токеном: EMAIL_REDACTED
#   - Если prefix не задан — используется [REDACTED]
#   - Быстрый, простой и необратимый режим
#   - Не требует секрета, кэша или reversible_mapping
#
# Используется для:
#   - логов и дампов, где исходное значение не нужно даже частично;
#   - аудита и compliance — данные должны быть полностью скрыты;
#   - передачи данных внешним подрядчикам с минимальным доверием;
#   - случаев, когда структура значения не важна.

pipeline:
  deterministic_secret: "set-via-MASKFLOW_SECRET"

nlp:
  enabled: false
  auto_download: false
  min_confidence: 0.5
  provider_order:
    - gliner
    - spacy
    - natasha
    - qwen
  providers:
    gliner:
      enabled: false
      model_name: "urchade/gliner_multi-v2.1"
      model_path: null
      auto_download: null
      labels:
        - person
        - full name
        - organization
        - company
        - bank
        - legal entity
        - individual entrepreneur
        - location
        - address
      device: cpu
      threshold: 0.5
      batch_size: 16

    spacy:
      enabled: false
      model_name: "ru_core_news_lg"
      model_path: null
      auto_download: null
      batch_size: 32

    natasha:
      enabled: false

    qwen:
      enabled: false
      model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
      model_path: null
      auto_download: null
      labels:
        - person
        - full name
        - organization
        - company
        - bank
        - legal entity
        - individual entrepreneur
        - location
        - address
      device: cpu
      threshold: 0.5
      max_context_chars: 4000
      max_new_tokens: 512

rules:
  email:
    enabled: true
    mode: redact
    prefix: EMAIL     # результат: EMAIL_REDACTED

  phone:
    enabled: true
    mode: redact
    prefix: PHONE     # результат: PHONE_REDACTED

  bank_account:
    enabled: true
    mode: redact
    prefix: ACCOUNT

  bik:
    enabled: true
    mode: redact
    prefix: BIK

  document_code:
    enabled: true
    mode: redact
    prefix: CODE

  inn:
    enabled: true
    mode: redact
    prefix: INN

  guid:
    enabled: true
    mode: redact
    prefix: ""        # результат: [REDACTED]

  snils:
    enabled: true
    mode: redact
    prefix: SNILS

  kpp:
    enabled: true
    mode: redact
    prefix: KPP

  ogrn:
    enabled: true
    mode: redact
    prefix: OGRN

  ip_address:
    enabled: true
    mode: redact
    prefix: IP

  url:
    enabled: true
    mode: redact
    prefix: URL

field_rules: {}

runtime_limits:
  regex_timeout_seconds: 5
  file_timeout_seconds: 300
  max_workers: 4

cache:
  # redact mode не требует кэша — токен всегда одинаков для любого значения.
  enabled: false
  path: "cache/entity-cache.json"

reversible_mapping:
  # redact необратим по определению.
  enabled: false
  path: "reversible/reversible-map.bin"
  encryption_key_env: "MASKFLOW_REVERSIBLE_KEY"
