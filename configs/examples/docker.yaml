pipeline:
  deterministic_secret: "set-via-MASKFLOW_SECRET"

rules:
  email:
    enabled: true
    mode: hmac
    prefix: EMAIL

  phone:
    enabled: true
    mode: hmac
    prefix: PHONE

  inn:
    enabled: true
    mode: hmac
    prefix: INN

  guid:
    enabled: true
    mode: hmac
    prefix: GUID

field_rules: {}

runtime_limits:
  regex_timeout_seconds: 5
  file_timeout_seconds: 300
  max_workers: 2

cache:
  enabled: true
  path: "cache/entity-cache.json"

reversible_mapping:
  enabled: false
  path: "reversible/reversible-map.bin"
  encryption_key_env: "MASKFLOW_REVERSIBLE_KEY"
