# Пример: формат-сохраняющая маскировка (preserve_format).
# Цифры заменяются цифрами, буквы — буквами, разделители сохраняются.
# Длина и структура значений не изменяются.
# Файл переименован в preserve_format.yaml; этот сохранён для обратной совместимости.
pipeline:
  deterministic_secret: "set-via-MASKFLOW_SECRET"

nlp:
  enabled: false
  auto_download: false
  min_confidence: 0.5
  provider_order:
    - gliner
    - spacy
    - natasha
    - qwen
  providers:
    gliner:
      enabled: false
      model_name: "urchade/gliner_multi-v2.1"
      model_path: null
      auto_download: null
      labels:
        - person
        - full name
        - organization
        - company
        - bank
        - legal entity
        - individual entrepreneur
        - location
        - address
      device: cpu
      threshold: 0.5
      batch_size: 16

    spacy:
      enabled: false
      model_name: "ru_core_news_lg"
      model_path: null
      auto_download: null
      batch_size: 32

    natasha:
      enabled: false

    qwen:
      enabled: false
      model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
      model_path: null
      auto_download: null
      labels:
        - person
        - full name
        - organization
        - company
        - bank
        - legal entity
        - individual entrepreneur
        - location
        - address
      device: cpu
      threshold: 0.5
      max_context_chars: 4000
      max_new_tokens: 512

rules:
  email:
    enabled: true
    mode: preserve_format
    prefix: EMAIL

  phone:
    enabled: true
    mode: preserve_format
    prefix: PHONE

  bank_account:
    enabled: true
    mode: preserve_format
    prefix: ACCOUNT

  bik:
    enabled: true
    mode: preserve_format
    prefix: BIK

  document_code:
    enabled: true
    mode: preserve_format
    prefix: CODE

  inn:
    enabled: true
    mode: preserve_format
    prefix: INN

  guid:
    enabled: true
    mode: preserve_format
    prefix: GUID

  snils:
    enabled: true
    mode: preserve_format
    prefix: SNILS

  kpp:
    enabled: true
    mode: preserve_format
    prefix: KPP

  ogrn:
    enabled: true
    mode: preserve_format
    prefix: OGRN

  ip_address:
    enabled: true
    mode: preserve_format
    prefix: IP

  url:
    enabled: true
    mode: preserve_format
    prefix: URL

field_rules: {}

runtime_limits:
  regex_timeout_seconds: 5
  file_timeout_seconds: 300
  max_workers: 1

cache:
  enabled: false
  path: "cache/entity-cache.json"

reversible_mapping:
  enabled: false
  path: "reversible/reversible-map.bin"
  encryption_key_env: "MASKFLOW_REVERSIBLE_KEY"
