# Пример: частичная маска (partial mode).
#
# Поведение:
#   - Email:   ex***@mail.ru  (показывает первые 2 символа локальной части + домен)
#   - Прочее:  ab***xy        (показывает первые 2 и последние 2 символа)
#
# Используется когда нужно скрыть данные, но сохранить читаемость —
# например, в аналитических отчётах или тестовых выгрузках.
#
# Не требует reversible_mapping — демаскирование невозможно и не нужно.
# Не требует entity_cache — partial не является детерминированным токеном.

pipeline:
  deterministic_secret: "set-via-MASKFLOW_SECRET"

nlp:
  enabled: false
  auto_download: false
  min_confidence: 0.5
  provider_order:
    - gliner
    - spacy
    - natasha
    - qwen
  providers:
    gliner:
      enabled: false
      model_name: "urchade/gliner_multi-v2.1"
      model_path: null
      auto_download: null
      labels:
        - person
        - full name
        - organization
        - company
        - bank
        - legal entity
        - individual entrepreneur
        - location
        - address
      device: cpu
      threshold: 0.5
      batch_size: 16

    spacy:
      enabled: false
      model_name: "ru_core_news_lg"
      model_path: null
      auto_download: null
      batch_size: 32

    natasha:
      enabled: false

    qwen:
      enabled: false
      model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
      model_path: null
      auto_download: null
      labels:
        - person
        - full name
        - organization
        - company
        - bank
        - legal entity
        - individual entrepreneur
        - location
        - address
      device: cpu
      threshold: 0.5
      max_context_chars: 4000
      max_new_tokens: 512

rules:
  email:
    enabled: true
    mode: partial
    prefix: ""  # prefix не используется в partial mode

  phone:
    enabled: true
    mode: partial
    prefix: ""

  bank_account:
    enabled: true
    mode: partial
    prefix: ""

  bik:
    enabled: true
    mode: partial
    prefix: ""

  document_code:
    enabled: true
    mode: partial
    prefix: ""

  inn:
    enabled: true
    mode: partial
    prefix: ""

  guid:
    enabled: true
    mode: partial
    prefix: ""

  snils:
    enabled: true
    mode: partial
    prefix: ""

  kpp:
    enabled: true
    mode: partial
    prefix: ""

  ogrn:
    enabled: true
    mode: partial
    prefix: ""

  ip_address:
    enabled: true
    mode: partial
    prefix: ""

  url:
    enabled: true
    mode: partial
    prefix: ""

field_rules: {}

runtime_limits:
  regex_timeout_seconds: 5
  file_timeout_seconds: 300
  max_workers: 4

cache:
  enabled: false
  path: "cache/entity-cache.json"

reversible_mapping:
  enabled: false
  path: "reversible/reversible-map.bin"
  encryption_key_env: "MASKFLOW_REVERSIBLE_KEY"
