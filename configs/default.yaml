pipeline:
  # ВНИМАНИЕ: для production задавайте секрет через переменную окружения
  # MASKFLOW_SECRET — она перекроет это значение. Здесь явное значение оставлено
  # пустым специально, чтобы загрузчик упал, если ENV не задан.
  deterministic_secret: "set-via-MASKFLOW_SECRET"

nlp:
  # NLP выключен по умолчанию: базовая установка MaskFlow не должна требовать
  # тяжелые ML-зависимости или локальные модели.
  enabled: false
  # Автоматическое скачивание моделей выключено по умолчанию. В production
  # предпочтительно заранее положить модели в data/models.
  auto_download: false
  # Минимальная уверенность resolved NLP-сущности. Кандидаты ниже порога
  # resolver отбрасывает.
  min_confidence: 0.5
  # Порядок запуска NLP-провайдеров. Resolver учитывает источники и приоритеты,
  # но порядок важен для стабильности и диагностики.
  provider_order:
    - gliner
    - spacy
    - natasha
    - qwen
  providers:
    gliner:
      # Zero-shot NER provider. Требует extra dependency nlp.
      enabled: false
      # Hugging Face model id для будущего автоматического скачивания.
      # Для PII-heavy режима можно использовать: urchade/gliner_multi_pii-v1
      model_name: "urchade/gliner_multi-v2.1"
      # Абсолютный путь или путь относительно data/models.
      model_path: null
      # null = наследовать nlp.auto_download.
      auto_download: null
      # Список entity labels, которые GLiNER должен искать в тексте.
      labels:
        - person
        - organization
        - location
        - address
      # Устройство инференса: cpu, cuda, cuda:0 и т.п.
      device: cpu
      # Порог уверенности GLiNER до передачи кандидата в resolver.
      threshold: 0.5
      # Зарезервированный размер batch для будущей пакетной обработки.
      batch_size: 16

    spacy:
      # Rule/statistical NLP provider. Изначально базовый, позже может быть
      # заменен на fine-tuned model через model_path.
      enabled: false
      # spaCy package name для автоматического скачивания в data/models/spacy.
      model_name: "ru_core_news_lg"
      # Абсолютный путь, installed package name или путь относительно data/models.
      model_path: null
      # null = наследовать nlp.auto_download.
      auto_download: null
      # Размер batch для будущей обработки nlp.pipe.
      batch_size: 32

    natasha:
      # Локальный rule/statistical provider для русского языка.
      enabled: false

    qwen:
      # Optional verifier; отдельные LLM-зависимости будут подключаться позже.
      enabled: false
      # Hugging Face model id для будущего optional verifier.
      model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"
      # Абсолютный путь или путь относительно data/models.
      model_path: null
      # null = наследовать nlp.auto_download.
      auto_download: null
      # Список entity labels, которые optional verifier должен подтверждать.
      labels:
        - person
        - organization
        - location
        - address
      # Устройство инференса: cpu, cuda, cuda:0 и т.п.
      device: cpu
      # Минимальная уверенность Qwen-кандидата.
      threshold: 0.5
      # Максимальная длина текстового контекста, передаваемого verifier.
      max_context_chars: 4000
      # Максимальное число новых токенов в JSON-ответе verifier.
      max_new_tokens: 512

rules:
  # Regex/entity rules. enabled включает правило, mode выбирает способ
  # маскирования, prefix используется в итоговом токене.
  email:
    enabled: true
    mode: hmac
    prefix: EMAIL

  phone:
    enabled: true
    mode: hmac
    prefix: PHONE

  bank_account:
    enabled: true
    mode: hmac
    prefix: ACCOUNT

  bik:
    enabled: true
    mode: hmac
    prefix: BIK

  inn:
    enabled: true
    mode: hmac
    prefix: INN

  guid:
    enabled: true
    mode: hmac
    prefix: GUID

  snils:
    enabled: true
    mode: hmac
    prefix: SNILS

  kpp:
    enabled: true
    mode: hmac
    prefix: KPP

  ogrn:
    enabled: true
    mode: hmac
    prefix: OGRN

  ip_address:
    enabled: true
    mode: hmac
    prefix: IP

  url:
    enabled: true
    mode: hmac
    prefix: URL

# Поле-ориентированные правила для структурированных форматов
# (CSV/XLSX/JSON/XML). Пустой объект означает отсутствие field overrides.
field_rules: {}

runtime_limits:
  # Максимальное время выполнения одного regex-детектора.
  regex_timeout_seconds: 5
  # Общий лимит обработки файла. null отключает лимит.
  file_timeout_seconds: 300
  # Максимум параллельных workers для batch-сценариев.
  max_workers: 4

cache:
  # Entity cache сохраняет стабильность токенов между запусками.
  enabled: true
  # Путь относительно MASKFLOW_DATA_DIR или абсолютный путь.
  path: "cache/entity-cache.json"

reversible_mapping:
  # Хранит зашифрованное соответствие token -> original для demask.
  enabled: true
  # Путь относительно MASKFLOW_DATA_DIR или абсолютный путь.
  path: "reversible/reversible-map.bin"
  # ENV-переменная с Fernet key для reversible mapping.
  encryption_key_env: "MASKFLOW_REVERSIBLE_KEY"
