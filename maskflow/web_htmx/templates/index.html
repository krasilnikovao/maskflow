<section class="split">
  <article class="panel">
    <h1>Mask Text</h1>
    <form
      class="mask-form"
      data-ajax-form
      data-target="#mask-result"
      action="/web/mask-text"
      method="post"
    >
      <label for="text">Text</label>
      <textarea id="text" name="text" rows="12" placeholder="Paste text to mask"></textarea>
      <button type="submit">Mask Text</button>
    </form>
    <pre id="mask-result" class="result"></pre>
  </article>

  <article class="panel">
    <h1>Mask File</h1>
    <form
      class="mask-form"
      data-ajax-form
      data-target="#file-result"
      action="/web/mask-file"
      method="post"
      enctype="multipart/form-data"
    >
      <label for="file">Supported: $supported_extensions</label>
      <input id="file" name="file" type="file" accept=".csv,.docx,.json,.sql,.txt,.xlsx,.xml">
      <button type="submit">Mask File</button>
    </form>
    <div id="file-result" class="result"></div>
  </article>
</section>

<section class="split section-gap">
  <article class="panel">
    <h1>Demask Text</h1>
    <form
      class="mask-form"
      data-ajax-form
      data-target="#demask-result"
      action="/web/demask-text"
      method="post"
    >
      <label for="demask-text">Masked Text</label>
      <textarea id="demask-text" name="text" rows="12" placeholder="Paste reversible masked text"></textarea>
      <button type="submit">Demask Text</button>
    </form>
    <pre id="demask-result" class="result"></pre>
  </article>

  <article class="panel">
    <h1>Demask File</h1>
    <form
      class="mask-form"
      data-ajax-form
      data-target="#demask-file-result"
      action="/web/demask-file"
      method="post"
      enctype="multipart/form-data"
    >
      <label for="demask-file">Supported: $supported_extensions</label>
      <input id="demask-file" name="file" type="file" accept=".csv,.docx,.json,.sql,.txt,.xlsx,.xml">
      <button type="submit">Demask File</button>
    </form>
    <div id="demask-file-result" class="result"></div>
  </article>
</section>
