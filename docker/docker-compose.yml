name: maskflow

services:
  maskflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      MASKFLOW_DATA_DIR: /data
    volumes:
      - ../data:/data
    ports:
      - "3100:3100"
    command: ["api", "--host", "0.0.0.0", "--port", "3100"]
