name: maskflow

services:
  maskflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MASKFLOW_EXTRAS: ${MASKFLOW_EXTRAS:-}
    env_file:
      - ../.env
    environment:
      MASKFLOW_DATA_DIR: /data
      HF_TOKEN: ${HF_TOKEN:-}
      MASKFLOW_NLP_ENABLED: ${MASKFLOW_NLP_ENABLED:-false}
      MASKFLOW_NLP_AUTO_DOWNLOAD: ${MASKFLOW_NLP_AUTO_DOWNLOAD:-false}
      MASKFLOW_GLINER_ENABLED: ${MASKFLOW_GLINER_ENABLED:-false}
      MASKFLOW_GLINER_MODEL: ${MASKFLOW_GLINER_MODEL:-urchade/gliner_multi-v2.1}
      MASKFLOW_GLINER_MODEL_PATH: ${MASKFLOW_GLINER_MODEL_PATH:-}
      MASKFLOW_GLINER_DEVICE: ${MASKFLOW_GLINER_DEVICE:-cpu}
      MASKFLOW_SPACY_ENABLED: ${MASKFLOW_SPACY_ENABLED:-false}
      MASKFLOW_SPACY_MODEL: ${MASKFLOW_SPACY_MODEL:-ru_core_news_lg}
      MASKFLOW_SPACY_MODEL_PATH: ${MASKFLOW_SPACY_MODEL_PATH:-}
      MASKFLOW_NATASHA_ENABLED: ${MASKFLOW_NATASHA_ENABLED:-false}
      MASKFLOW_QWEN_ENABLED: ${MASKFLOW_QWEN_ENABLED:-false}
      MASKFLOW_QWEN_MODEL: ${MASKFLOW_QWEN_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      MASKFLOW_QWEN_MODEL_PATH: ${MASKFLOW_QWEN_MODEL_PATH:-}
      MASKFLOW_QWEN_DEVICE: ${MASKFLOW_QWEN_DEVICE:-cpu}
    volumes:
      - ../data:/data
    ports:
      - "3100:3100"
    command: ["web", "--host", "0.0.0.0", "--port", "3100"]
